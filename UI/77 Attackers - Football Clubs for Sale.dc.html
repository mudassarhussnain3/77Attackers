<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:#F4F6F9;color:#1E293B;font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:#0A192F;text-decoration:none}a:hover{color:#9C7A1E}
::selection{background:#D4AF37;color:#0A192F}
.hl{display:block;overflow:hidden}
input,textarea{font-family:'Archivo',sans-serif}
</style>
<script>(function(){function hide(){var l=document.querySelector('.js-loader');if(!l)return;l.style.opacity='0';l.style.pointerEvents='none';setTimeout(function(){l.style.display='none';},550);}if(document.readyState==='complete'){setTimeout(hide,350);}else{window.addEventListener('load',function(){setTimeout(hide,350);});}})();</script>
</helmet>

<div style="min-height:100vh">
<div class="js-loader" style="position:fixed;inset:0;z-index:9999;background:#0A192F;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease"><div style="text-align:center"><div style="font-family:'Anton',sans-serif;font-size:64px;color:#D4AF37;letter-spacing:2px;line-height:1">77</div><div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(244,246,249,.6);margin-top:6px;text-transform:uppercase">Attackers</div></div></div>
<dc-import name="SiteHeader" hint-size="100%,64px"></dc-import>

<main>
<section style="position:relative;overflow:hidden;padding:170px clamp(20px,5vw,72px) 60px;background:#0A192F;color:#fff">
  <img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=1600&q=80" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0" />
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,25,47,.78),rgba(10,25,47,.94));z-index:1"></div>
  <div style="position:relative;z-index:2;max-width:900px;margin:0 auto;text-align:center">
    <p style="font-family:'Space Mono',monospace;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#D4AF37;margin:0 0 18px">Exclusive investment opportunities</p>
    <h1 style="font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(30px,5vw,58px);line-height:1.1;letter-spacing:-.5px;margin:0;text-transform:uppercase">
      <span class="hl"><span style="display:block">Football Clubs for Sale</span></span>
    </h1>
    <button onClick="{{ scrollToForm }}" style="margin-top:28px;background:#D4AF37;color:#0A192F;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-weight:700;font-size:13.5px;letter-spacing:.5px;padding:15px 26px;border-radius:100px" style-hover="transform:translateY(-2px)">Get access to investment opportunities in Football Clubs →</button>
  </div>
</section>

<section style="padding:clamp(56px,8vw,100px) clamp(20px,5vw,72px)">
  <div style="max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">
    <sc-for list="{{ points }}" as="p" hint-placeholder-count="5">
      <div class="rv" style="background:#fff;border:1px solid rgba(10,25,47,.1);border-radius:8px;padding:26px">
        <span style="font-family:'Space Mono',monospace;font-size:12px;color:#D4AF37">{{ p.num }}</span>
        <p style="font-size:15px;line-height:1.55;color:#334155;margin:12px 0 0">{{ p.text }}</p>
      </div>
    </sc-for>
  </div>
</section>

<section id="invest-form" style="padding:0 clamp(20px,5vw,72px) clamp(70px,9vw,110px)">
  <div class="rv" style="max-width:640px;margin:0 auto;background:#0A192F;color:#fff;border-radius:12px;padding:clamp(32px,4vw,48px)">
    <h2 style="font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(22px,2.6vw,30px);letter-spacing:-.2px;margin:0 0 8px;text-transform:uppercase">Register your interest</h2>
    <p style="font-size:14px;color:rgba(244,246,249,.65);margin:0 0 24px">Tell us about your investment interest — we'll follow up directly.</p>
    <div style="display:grid;gap:14px">
      <input placeholder="Name" style="background:rgba(244,246,249,.08);border:1px solid rgba(244,246,249,.2);border-radius:6px;padding:13px 14px;color:#fff;font-size:14px" />
      <input placeholder="Email" style="background:rgba(244,246,249,.08);border:1px solid rgba(244,246,249,.2);border-radius:6px;padding:13px 14px;color:#fff;font-size:14px" />
      <input placeholder="Phone (with country prefix)" style="background:rgba(244,246,249,.08);border:1px solid rgba(244,246,249,.2);border-radius:6px;padding:13px 14px;color:#fff;font-size:14px" />
      <textarea placeholder="Message — tell us about your investment interest" rows="4" style="background:rgba(244,246,249,.08);border:1px solid rgba(244,246,249,.2);border-radius:6px;padding:13px 14px;color:#fff;font-size:14px;resize:vertical"></textarea>
      <button style="background:#D4AF37;color:#0A192F;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-weight:700;font-size:13.5px;letter-spacing:.5px;padding:15px;border-radius:6px">Submit enquiry</button>
    </div>
  </div>
</section>
</main>

<dc-import name="SiteFooter" hint-size="100%,400px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() { import("./site-motion.js").then(m => m.initPageMotion()); }
  renderVals() {
    return {
      scrollToForm: () => document.getElementById("invest-form")?.scrollIntoView({ behavior: "smooth" }),
      points: [
        "Club valuations, fair sale structures and transparent, thorough due diligence.",
        "International networks with direct contact to commercial divisions.",
        "Client base spans gaming, crypto, blockchain, medical cannabis, shipping and financial sectors.",
        "Sourcing experienced management — scouting, technical staff and executive positions.",
        "Ancillary real-estate development opportunities: hotels, spas, medical clinics, training facilities, retail outlets."
      ].map((text, i) => ({ text, num: String(i + 1).padStart(2, "0") }))
    };
  }
}
</script>
</body>
</html>
