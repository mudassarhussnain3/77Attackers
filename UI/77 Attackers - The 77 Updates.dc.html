<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:#F4F6F9;color:#1E293B;font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:#0A192F;text-decoration:none}a:hover{color:#9C7A1E}
::selection{background:#D4AF37;color:#0A192F}
.hl{display:block;overflow:hidden}
</style>
<script>(function(){function hide(){var l=document.querySelector('.js-loader');if(!l)return;l.style.opacity='0';l.style.pointerEvents='none';setTimeout(function(){l.style.display='none';},550);}if(document.readyState==='complete'){setTimeout(hide,350);}else{window.addEventListener('load',function(){setTimeout(hide,350);});}})();</script>
</helmet>

<div style="min-height:100vh">
<div class="js-loader" style="position:fixed;inset:0;z-index:9999;background:#0A192F;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease"><div style="text-align:center"><div style="font-family:'Anton',sans-serif;font-size:64px;color:#D4AF37;letter-spacing:2px;line-height:1">77</div><div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(244,246,249,.6);margin-top:6px;text-transform:uppercase">Attackers</div></div></div>
<dc-import name="SiteHeader" hint-size="100%,64px"></dc-import>

<main>
<section style="position:relative;overflow:hidden;padding:170px clamp(20px,5vw,72px) 60px">
  <img src="https://images.unsplash.com/photo-1543326727-cf6c39e8f84c?auto=format&fit=crop&w=1600&q=80" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0" />
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 65% 60% at 50% 40%,rgba(244,246,249,.96) 0%,rgba(244,246,249,.86) 45%,rgba(244,246,249,.4) 75%,rgba(244,246,249,.12) 100%);z-index:1"></div>
  <div style="position:relative;z-index:2;max-width:800px;margin:0 auto;text-align:center">
    <h1 style="font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(30px,5vw,58px);line-height:1.1;letter-spacing:-.4px;margin:0;text-transform:uppercase;color:#0A192F">
      <span class="hl"><span style="display:block">Subscribe and get the</span></span>
      <span class="hl"><span style="display:block">updates via email!</span></span>
    </h1>
  </div>
</section>

<section style="padding:0 clamp(20px,5vw,72px) clamp(70px,9vw,110px)">
  <div style="max-width:1100px;margin:0 auto">
    <div class="rv" style="font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;color:#64748b;text-transform:uppercase;margin-bottom:24px">Newsletter archive</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px">
      <sc-for list="{{ issues }}" as="iss" hint-placeholder-count="3">
        <div class="rv" style="background:#fff;border:1px solid rgba(10,25,47,.1);border-radius:10px;overflow:hidden">
          <div style="aspect-ratio:3/4;background:linear-gradient(160deg,#0A192F,#132a4a);display:flex;flex-direction:column;justify-content:space-between;padding:22px;cursor:pointer" onClick="{{ iss.onZoom }}">
            <span style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:#D4AF37;text-transform:uppercase">77 Updates</span>
            <span style="font-family:'Anton',sans-serif;font-size:clamp(30px,4vw,44px);color:#fff;text-transform:uppercase">Issue #{{ iss.n }}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px">
            <button onClick="{{ iss.onZoom }}" style="background:none;border:1px solid rgba(10,25,47,.2);color:#0A192F;cursor:pointer;font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.5px;padding:8px 14px;border-radius:100px">View / zoom</button>
            <button onClick="{{ iss.onLike }}" style="display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:{{ iss.likeColor }};font-family:'Space Mono',monospace;font-size:12.5px">♥ {{ iss.likes }}</button>
          </div>
        </div>
      </sc-for>
    </div>
  </div>
</section>
</main>

<dc-import name="SiteFooter" hint-size="100%,400px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { likes: { 3: 0, 2: 0, 1: 0 }, liked: {} };
  componentDidMount() { import("./site-motion.js").then(m => m.initPageMotion()); }
  toggleLike(n) {
    this.setState(s => {
      const liked = { ...s.liked, [n]: !s.liked[n] };
      const likes = { ...s.likes, [n]: s.likes[n] + (liked[n] ? 1 : -1) };
      return { liked, likes };
    });
  }
  renderVals() {
    return { issues: [3, 2, 1].map(n => ({
      n, likes: this.state.likes[n], likeColor: this.state.liked[n] ? "#D4AF37" : "#64748b",
      onLike: () => this.toggleLike(n),
      onZoom: () => window.open("", "_blank")
    })) };
  }
}
</script>
</body>
</html>
