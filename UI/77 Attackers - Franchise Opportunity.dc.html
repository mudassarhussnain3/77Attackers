<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:#F4F6F9;color:#1E293B;font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:#0A192F;text-decoration:none}a:hover{color:#9C7A1E}
::selection{background:#D4AF37;color:#0A192F}
.hl{display:block;overflow:hidden}
</style>
<script>(function(){function hide(){var l=document.querySelector('.js-loader');if(!l)return;l.style.opacity='0';l.style.pointerEvents='none';setTimeout(function(){l.style.display='none';},550);}if(document.readyState==='complete'){setTimeout(hide,350);}else{window.addEventListener('load',function(){setTimeout(hide,350);});}})();</script>
</helmet>

<div style="min-height:100vh">
<div class="js-loader" style="position:fixed;inset:0;z-index:9999;background:#0A192F;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease"><div style="text-align:center"><div style="font-family:'Anton',sans-serif;font-size:64px;color:#D4AF37;letter-spacing:2px;line-height:1">77</div><div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(244,246,249,.6);margin-top:6px;text-transform:uppercase">Attackers</div></div></div>
<dc-import name="SiteHeader" hint-size="100%,64px"></dc-import>

<main>
<section style="position:relative;overflow:hidden;padding:170px clamp(20px,5vw,72px) 50px">
  <img src="https://images.unsplash.com/photo-1579952363873-27f3bade9f55?auto=format&fit=crop&w=1600&q=80" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0" />
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 65% 60% at 50% 40%,rgba(244,246,249,.96) 0%,rgba(244,246,249,.86) 45%,rgba(244,246,249,.4) 75%,rgba(244,246,249,.12) 100%);z-index:1"></div>
  <div style="position:relative;z-index:2;max-width:900px;margin:0 auto;text-align:center">
    <h1 style="font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(32px,5.5vw,64px);line-height:1.05;letter-spacing:-.5px;margin:0;text-transform:uppercase;color:#0A192F">
      <span class="hl"><span style="display:block">Franchise Opportunity</span></span>
    </h1>
    <p class="rv" style="font-size:15.5px;line-height:1.6;color:#475569;margin:18px auto 0;max-width:680px">'77 Attackers' franchise opportunities are available in order to provide the franchisee access to:</p>
  </div>
</section>

<section style="padding:0 clamp(20px,5vw,72px) clamp(70px,9vw,110px)">
  <div style="max-width:900px;margin:0 auto;display:grid;gap:12px">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="7">
      <div class="rv" style="display:flex;gap:18px;align-items:flex-start;padding:20px 0;border-bottom:1px solid rgba(10,25,47,.1)">
        <span style="font-family:'Space Mono',monospace;font-size:12px;color:#D4AF37;min-width:26px">{{ it.num }}</span>
        <p style="font-size:15px;line-height:1.6;color:#334155;margin:0">{{ it.text }}</p>
      </div>
    </sc-for>
  </div>
</section>
</main>

<dc-import name="SiteFooter" hint-size="100%,400px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() { import("./site-motion.js").then(m => m.initPageMotion()); }
  renderVals() {
    return { items: [
      "A pool of available players. All players would be in direct contact with '77 Attackers' and would have signed mandates in favour of '77 Attackers'.",
      "Requests from football Clubs.",
      "Brokering the sale of football clubs which are for sale.",
      "Front of jersey advertising spaces; the sale of naming rights of stadiums etc.",
      "Organising training camps in one's home country, in conjunction with well renowned football Academies — Coaches also select young talented players to trial back in the Club's country.",
      "All the necessary intellectual property (written mandates, representation agreements, commission agreements with Clubs etc).",
      "Website, social media and emailshots."
    ].map((text, i) => ({ text, num: String(i + 1).padStart(2, "0") })) };
  }
}
</script>
</body>
</html>
